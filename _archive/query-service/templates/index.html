{% extends 'layout.html' %}

{% block head_scripts %}
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.css" />
  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.js"></script>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
{% endblock %}

{% block content %}
  <style>
    html, body { height: 100%; overflow: hidden; }
    nav { height: 100vh; height: 100svh; height: 100dvh; overflow: auto; }
    main { height: 100vh; height: 100svh; height: 100dvh; overflow: hidden; display: flex; flex-direction: column; }
    .terminal-wrapper { flex: 1; background: #000; position: relative; }
    .terminal-host { width: 100%; height: 100%; }
  </style>
  <div class="terminal-wrapper">
    <div id="terminalHost" class="terminal-host"></div>
  </div>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const host = document.getElementById('terminalHost');
      const term = new Terminal();
      const fitAddon = new FitAddon.FitAddon();
      term.loadAddon(fitAddon);
      term.open(host);
      term.focus();

      const socket = io({ auth: { window_name: 'main' } });

      function sendResize() {
        const cols = term.cols || 80;
        const rows = term.rows || 24;
        socket.emit('resize', { cols, rows });
      }

      function fitAndResize() {
        fitAddon.fit();
        sendResize();
      }

      socket.on('connect', () => {
        fitAndResize();
      });

      term.onData((data) => {
        socket.emit('terminal_input', data);
      });

      socket.on('terminal_output', (data) => {
        term.write(data);
      });

      function debounce(fn, wait) { let t; return function(){ clearTimeout(t); t = setTimeout(fn, wait); }; }
      window.addEventListener('resize', debounce(fitAndResize, 150));
    });
  </script>
{% endblock %}
