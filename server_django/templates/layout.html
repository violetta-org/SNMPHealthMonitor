{% load static %}
<!doctype html>
<html lang="vi">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Web Shell</title>
  <style>
    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      display: flex;
      min-height: 100vh;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial, "Noto Sans", "Liberation Sans", sans-serif;
    }

    nav {
      width: 200px;
      background: #111;
      color: #fff;
      padding: 16px;
      box-sizing: border-box;
    }

    nav a {
      display: block;
      color: #fff;
      text-decoration: none;
      padding: 8px 12px;
      /* Added horizontal padding */
      border-radius: 4px;
      /* Soften edges */
      margin-bottom: 4px;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 500;
      border-left: 3px solid transparent;
      opacity: 0.8;
    }

    nav a:hover {
      background-color: rgba(255, 255, 255, 0.08);
      /* Sophisticated glass effect */
      color: #fff;
      padding-left: 16px;
      /* Subtle slide effect */
      border-left-color: #d4af37;
      /* Gold accent on hover */
      opacity: 1;
      text-decoration: none;
    }

    /* Active state (styled via CSS if class present, or just hover style validation) 
       User requested to undo logic, but if they click, it reloads. 
       We can assume the user wants the Visuals to be ready for an active state if added later,
       or just mostly hover effects. */

    main {
      flex-grow: 1;
      box-sizing: border-box;
      padding: 0;
      overflow: auto;
      background: #0d1117;
      /* Deep Charcoal / Luxury Dark */
    }
  </style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/ai-chatbot.css' %}">
  {% block head_scripts %}{% endblock %}
</head>

<body>
  <nav>
    <h3
      style="margin-top:0; padding-left: 12px; margin-bottom: 30px; letter-spacing: 1px; font-weight: 600; color: #fff; text-transform: uppercase; font-size: 0.85rem;">
      System</h3>
    <a href="{% url 'web:dashboard_default' %}"><i class="fas fa-chart-line" style="width: 20px;"></i> Dashboard</a>
    <a href="{% url 'web:index' %}"><i class="fas fa-terminal" style="width: 20px;"></i> Terminal</a>
    <a href="{% url 'web:files' %}"><i class="fas fa-folder-open" style="width: 20px;"></i> File Manager</a>
    <a href="{% url 'web:trash' %}"><i class="fas fa-trash-alt" style="width: 20px;"></i> Trash</a>
    <a href="{% url 'web:system' %}"><i class="fas fa-microchip" style="width: 20px;"></i> System Manager</a>
    <a href="{% url 'web:logs_view' %}"><i class="fas fa-shield-alt" style="width: 20px;"></i> Audit Logs</a>
    <a href="{% url 'web:logout' %}"><i class="fas fa-sign-out-alt" style="width: 20px;"></i> Logout</a>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>

  <!-- AI DevOps Assistant Chatbot -->
  <script src="{% static 'js/ai-chatbot.js' %}"></script>
</body>

</html>
