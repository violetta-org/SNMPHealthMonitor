<section class="info-card">
    <h2 class="card-title">System Information</h2>
    <div class="info-grid">
        <div class="info-item">
            <label>System Name</label>
            <span id="sysname">-</span>
        </div>
        <div class="info-item">
            <label>Location</label>
            <span id="sys-location">-</span>
        </div>
        <div class="info-item">
            <label>Uptime</label>
            <span id="sys-uptime">-</span>
        </div>
    </div>
</section>

<section class="metrics-section">
    <h2 class="section-title">CPU Metrics</h2>
    <div class="gauges-grid">
        <!-- removed Total CPU card as requested; CPU cores shown below -->
    </div>
    <div id="cpu-cores-container" class="cpu-cores-grid"></div>
</section>

<section class="metrics-section">
    <h2 class="section-title">System Metrics</h2>
    <div class="gauges-grid">
        
        <div class="gauge-card">
            <h3>Memory</h3>
            <div class="gauge-wrapper">
                <svg id="memory-gauge" class="gauge" viewBox="0 0 120 120">
                    <circle class="gauge-background" cx="60" cy="60" r="45"></circle>
                    <circle class="gauge-progress" cx="60" cy="60" r="45"></circle>
                </svg>
                <div class="gauge-content">
                    <span id="memory-value" class="gauge-value">0.0</span>
                    <span class="gauge-unit">%</span>
                </div>
            </div>
        </div>

        <div class="gauge-card">
            <h3>Swap</h3>
            <div class="gauge-wrapper">
                <svg id="swap-gauge" class="gauge" viewBox="0 0 120 120">
                    <circle class="gauge-background" cx="60" cy="60" r="45"></circle>
                    <circle class="gauge-progress" cx="60" cy="60" r="45"></circle>
                </svg>
                <div class="gauge-content">
                    <span id="swap-value" class="gauge-value">0.0</span>
                    <span class="gauge-unit">%</span>
                </div>
            </div>
        </div>

        <div class="gauge-card">
            <h3>Load 1m</h3>
            <div class="gauge-wrapper">
                <svg id="load-1m-gauge" class="gauge" viewBox="0 0 120 120">
                    <circle class="gauge-background" cx="60" cy="60" r="45"></circle>
                    <circle class="gauge-progress" cx="60" cy="60" r="45"></circle>
                </svg>
                <div class="gauge-content">
                    <span id="load-1m-value" class="gauge-value">-</span>
                </div>
            </div>
        </div>

        <div class="gauge-card">
            <h3>Load 5m</h3>
            <div class="gauge-wrapper">
                <svg id="load-5m-gauge" class="gauge" viewBox="0 0 120 120">
                    <circle class="gauge-background" cx="60" cy="60" r="45"></circle>
                    <circle class="gauge-progress" cx="60" cy="60" r="45"></circle>
                </svg>
                <div class="gauge-content">
                    <span id="load-5m-value" class="gauge-value">-</span>
                </div>
            </div>
        </div>

        <div class="gauge-card">
            <h3>Load 15m</h3>
            <div class="gauge-wrapper">
                <svg id="load-15m-gauge" class="gauge" viewBox="0 0 120 120">
                    <circle class="gauge-background" cx="60" cy="60" r="45"></circle>
                    <circle class="gauge-progress" cx="60" cy="60" r="45"></circle>
                </svg>
                <div class="gauge-content">
                    <span id="load-15m-value" class="gauge-value">-</span>
                </div>
            </div>
        </div>

        <div class="gauge-card">
            <h3>Temp</h3>
            <div class="gauge-wrapper">
                <svg id="temperature-gauge" class="gauge" viewBox="0 0 120 120">
                    <circle class="gauge-background" cx="60" cy="60" r="45"></circle>
                    <circle class="gauge-progress" cx="60" cy="60" r="45"></circle>
                </svg>
                <div class="gauge-content">
                    <span id="temperature-value" class="gauge-value">-</span>
                </div>
            </div>
            <small id="temperature-info" style="display:block; font-size: 0.7em; margin-top:6px;"></small>
        </div>
    </div>
</section>

<section class="details-section">
    <div class="detail-card memory-chart-card">
        <h3 class="detail-title">Memory History</h3>
        <div id="memory-percent-chart"><canvas></canvas></div>
        <div id="memory-chart"><canvas></canvas></div>
        
        <div class="detail-grid mt-2">
            <div class="detail-item">
                <label>Tổng</label>
                <span id="memory-total-detail">-</span>
            </div>
        </div>
    </div>

    <div class="detail-card">
        <h3 class="detail-title">Swap Details</h3>
        <div class="detail-grid">
            <div class="detail-item">
                <label>Total</label>
                <span id="swap-total-detail">-</span>
            </div>
            <div class="detail-item">
                <label>Free</label>
                <span id="swap-free">-</span>
            </div>
        </div>
    </div>
</section>

{% block extra_scripts %}
{% endblock %}
