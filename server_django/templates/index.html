{% extends 'layout.html' %}

{% block head_scripts %}
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.css" crossorigin="anonymous" />
  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.js" crossorigin="anonymous"></script>
{% endblock %}

{% block content %}
  <style>
    html, body { height: 100%; overflow: hidden; }
    nav { height: 100vh; height: 100svh; height: 100dvh; overflow: auto; }
    main { height: 100vh; height: 100svh; height: 100dvh; overflow: hidden; display: flex; flex-direction: column; }
    .terminal-wrapper { flex: 1; background: #000; position: relative; }
    .terminal-host { width: 100%; height: 100%; }
  </style>
  <div class="terminal-wrapper">
    <div id="terminalHost" class="terminal-host"></div>
  </div>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const host = document.getElementById('terminalHost');
      const term = new Terminal();
      const fitAddon = new FitAddon.FitAddon();
      term.loadAddon(fitAddon);
      term.open(host);
      term.focus();

      const wsProtocol = window.location.protocol === 'https:' ? 'wss://' : 'ws://';
      const wsUrl = wsProtocol + window.location.host + '/ws/terminal/';
      const socket = new WebSocket(wsUrl);

      function sendResize() {
        if (socket.readyState !== WebSocket.OPEN) return;
        const cols = term.cols || 80;
        const rows = term.rows || 24;
        socket.send(JSON.stringify({ event: 'resize', cols: cols, rows: rows }));
      }

      function fitAndResize() {
        fitAddon.fit();
        sendResize();
      }

      socket.onopen = () => {
        fitAndResize();
      };

      term.onData((data) => {
        if (socket.readyState === WebSocket.OPEN) {
          socket.send(JSON.stringify({ event: 'terminal_input', data: data }));
        }
      });

      socket.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        if (msg.event === 'terminal_output') {
          term.write(msg.data);
        }
      };

      function debounce(fn, wait) { let t; return function(){ clearTimeout(t); t = setTimeout(fn, wait); }; }
      window.addEventListener('resize', debounce(fitAndResize, 150));
    });
  </script>
{% endblock %}
